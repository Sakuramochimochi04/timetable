<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>タイムテーブル作成</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
    }
    .settings {
      margin: 10px 0;
    }
    label {
      display: block;
      margin: 5px 0;
    }
    button {
      padding: 10px 20px;
      margin-right: 10px;
      font-size: 16px;
    }
    #result {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 15px;
    }
  </style>
</head>
<body>

<h1>タイムテーブル作成</h1>

<textarea id="input" placeholder="名前,ユニット,時間(分)
例：
A,ユニット1,10
B,ユニット2,8"></textarea>

<div class="settings">
  <label>開始時間：<input type="time" id="startTime" value="13:00"></label>
  <label>転換時間(分)：<input type="number" id="changeTime" value="5"></label>
  <label>何組ごとに休憩：<input type="number" id="breakInterval" value="3"></label>
  <label>休憩時間(分)：<input type="number" id="breakTime" value="10"></label>
</div>

<button onclick="createTable()">作成</button>
<button onclick="saveData()">保存</button>
<button onclick="loadData()">読み込み</button>

<h2>結果</h2>
<div id="result"></div>

<script>
// メイン処理
function createTable() {
  const input = document.getElementById("input").value.trim().split("\n");
  const startTime = document.getElementById("startTime").value;
  const changeTime = parseInt(document.getElementById("changeTime").value);
  const breakInterval = parseInt(document.getElementById("breakInterval").value);
  const breakTime = parseInt(document.getElementById("breakTime").value);

  let list = input.map(line => {
    let [name, unit, time] = line.split(",");
    return { name, unit, time: parseInt(time) };
  });

  list = shuffleAvoidSame(list);

  let current = timeToMinutes(startTime);
  let result = "";

  list.forEach((item, index) => {
    result += `${minutesToTime(current)} - ${item.unit} (${item.name})<br>`;
    current += item.time;

    current += changeTime;

    if ((index + 1) % breakInterval === 0 && index !== list.length - 1) {
      result += `<strong>--- 休憩 ---</strong><br>`;
      current += breakTime;
    }
  });

  result += `<br><strong>終了時間：${minutesToTime(current)}</strong>`;

  document.getElementById("result").innerHTML = result;
}

// 同じ人連続回避
function shuffleAvoidSame(list) {
  let shuffled = [...list].sort(() => Math.random() - 0.5);

  for (let i = 0; i < shuffled.length - 1; i++) {
    if (shuffled[i].name === shuffled[i + 1].name) {
      for (let j = i + 2; j < shuffled.length; j++) {
        if (shuffled[j].name !== shuffled[i].name) {
          [shuffled[i + 1], shuffled[j]] = [shuffled[j], shuffled[i + 1]];
          break;
        }
      }
    }
  }
  return shuffled;
}

// 時間処理
function timeToMinutes(time) {
  let [h, m] = time.split(":").map(Number);
  return h * 60 + m;
}

function minutesToTime(min) {
  let h = Math.floor(min / 60);
  let m = min % 60;
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}

// 保存
function saveData() {
  const data = {
    input: document.getElementById("input").value,
    startTime: document.getElementById("startTime").value,
    changeTime: document.getElementById("changeTime").value,
    breakInterval: document.getElementById("breakInterval").value,
    breakTime: document.getElementById("breakTime").value
  };
  localStorage.setItem("timetableData", JSON.stringify(data));
  alert("保存した！");
}

// 読み込み
function loadData() {
  const data = JSON.parse(localStorage.getItem("timetableData"));
  if (!data) {
    alert("保存データなし");
    return;
  }

  document.getElementById("input").value = data.input;
  document.getElementById("startTime").value = data.startTime;
  document.getElementById("changeTime").value = data.changeTime;
  document.getElementById("breakInterval").value = data.breakInterval;
  document.getElementById("breakTime").value = data.breakTime;
}

// ページ開いたら自動読み込み
window.onload = function() {
  loadData();
};
</script>

</body>
</html>
