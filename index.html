<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダンスサークル タイムテーブル作成</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; color: #333; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        h2 { font-size: 1.1rem; border-left: 4px solid #1a73e8; padding-left: 10px; margin-bottom: 15px; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 4px; }
        button:hover { background: #1557b0; }
        
        .chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .chip { background: #e8f0fe; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; display: flex; align-items: center; }
        .del { margin-left: 8px; color: #d93025; cursor: pointer; font-weight: bold; }
        
        .unit-card { background: #fafafa; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .checkbox-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; background: white; padding: 10px; border: 1px solid #eee; max-height: 120px; overflow-y: auto; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .rest-row { background: #fff4e5; font-weight: bold; }
        .mc-row { background: #e6fffa; color: #0891b2; font-weight: bold; }
        .gen-btn { width: 100%; padding: 15px; background: #34a853; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        .mc-btn { display: block; margin: 5px auto; padding: 3px 10px; font-size: 0.7rem; background: none; color: #1a73e8; border: 1px dashed #1a73e8; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>タイムテーブル作成</h1>

    <section>
        <h2>1. メンバー登録</h2>
        <div class="input-group">
            <input type="text" id="mName" placeholder="名前を入力">
            <button id="addM">追加</button>
        </div>
        <div id="mList" class="chip-list"></div>
    </section>

    <section>
        <h2>2. ユニット登録</h2>
        <div class="unit-card">
            <input type="text" id="uName" placeholder="ユニット名" style="width:70%">
            <div style="margin:10px 0">
                時間: <input type="number" id="uMin" placeholder="分" style="width:50px" min="0"> 分 
                <input type="number" id="uSec" placeholder="秒" style="width:50px" min="0" max="59"> 秒
            </div>
            <p style="font-size:0.8rem; color:#666">出演者を選択:</p>
            <div id="uChecks" class="checkbox-list"></div>
            <button id="addU">ユニットを追加</button>
        </div>
        <div id="uListDisp" style="margin-top:10px"></div>
    </section>

    <section>
        <h2>3. 設定</h2>
        <div class="input-group">
            開始: <input type="time" id="sTime" value="13:00">
            転換: <input type="number" id="tSec" value="60" style="width:50px"> 秒
            休憩: <input type="number" id="rMin" value="5" style="width:50px"> 分
        </div>
        <button id="genBtn" class="gen-btn">タイムテーブル生成</button>
    </section>

    <section id="resArea" style="display:none">
        <h2>完成タイムテーブル</h2>
        <table>
            <thead>
                <tr><th>時刻</th><th>内容</th><th>出演者</th><th>時間</th></tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </section>
</div>
