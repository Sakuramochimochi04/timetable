<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>タイムテーブル作成</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>タイムテーブル作成</h1>

<textarea id="input" placeholder="名前,ユニット,時間(分)
例：
A,ユニット1,10
B,ユニット2,8"></textarea>

<div class="settings">
  <label>開始時間：<input type="time" id="startTime" value="13:00"></label>
  <label>転換時間(分)：<input type="number" id="changeTime" value="5"></label>
  <label>何組ごとに休憩：<input type="number" id="breakInterval" value="3"></label>
  <label>休憩時間(分)：<input type="number" id="breakTime" value="10"></label>
</div>

<button onclick="createTable()">作成</button>
<button onclick="saveData()">保存</button>
<button onclick="loadData()">読み込み</button>

<h2>結果</h2>
<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
