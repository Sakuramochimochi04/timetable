<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダンスタイムテーブル作成</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        input, button { padding: 8px; margin: 5px 0; }
        .reset-btn { background: #ff4444; color: white; border: none; cursor: pointer; float: right; font-size: 12px; }
        .add-btn { background: #007bff; color: white; border: none; cursor: pointer; }
        .gen-btn { background: #28a745; color: white; border: none; width: 100%; padding: 15px; font-size: 18px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; background: #f0f0f0; margin: 5px 0; padding: 5px 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .rest { background: #fff3cd; }
        .mc { background: #d1ecf1; }
        .mc-ins { display: block; margin: 5px auto; font-size: 10px; color: blue; cursor: pointer; border: 1px dashed blue; background: none; }
    </style>
</head>
<body>

<div class="box">
    <button class="reset-btn" onclick="clearAllData()">データを全消去して初期化</button>
    <h1>タイムテーブル作成</h1>

    <section>
        <h2>1. メンバー登録</h2>
        <input type="text" id="mIn" placeholder="名前">
        <button class="add-btn" onclick="addM()">追加</button>
        <div id="mList"></div>
    </section>

    <section>
        <h2>2. ユニット登録</h2>
        <input type="text" id="uIn" placeholder="ユニット名" style="width:200px"><br>
        時間: <input type="number" id="uM" value="3" style="width:40px">分 
        <input type="number" id="uS" value="0" style="width:40px">秒<br>
        <p>出演者を選択:</p>
        <div id="uCheck"></div>
        <button class="add-btn" onclick="addU()">ユニットを追加</button>
        <div id="uList"></div>
    </section>

    <section>
        <h2>3. 設定</h2>
        開始: <input type="time" id="sTime" value="13:00">
        転換: <input type="number" id="tS" value="60" style="width:40px">秒
        休憩: <input type="number" id="rM" value="5" style="width:40px">分
        <button class="gen-btn" onclick="gen()">タイムテーブル生成</button>
    </section>

    <div id="res" style="display:none">
        <h2>完成タイムテーブル</h2>
        <table id="tTable">
            <thead><tr><th>時刻</th><th>内容</th><th>メンバー</th><th>時間</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
    // データの読み込み
    let members = JSON.parse(localStorage.getItem('dance_m') || '[]');
    let units = JSON.parse(localStorage.getItem('dance_u') || '[]');
    let ttData = [];

    // 画面の更新
    function view() {
        // メンバー一覧
        const ml = document.getElementById('mList');
        const uc = document.getElementById('uCheck');
        ml.innerHTML = ''; uc.innerHTML = '';
        members.forEach((m, i) => {
            ml.innerHTML += `<div class="item">${m} <span onclick="delM(${i})" style="color:red; cursor:pointer">削除</span></div>`;
            uc.innerHTML += `<label><input type="checkbox" name="c" value="${m}"> ${m}</label> `;
        });

        // ユニット一覧
        const ul = document.getElementById('uList');
        ul.innerHTML = '';
        units.forEach((u, i) => {
            ul.innerHTML += `<div class="item">${u.n} (${u.d}秒) <span onclick="delU(${i})" style="color:red; cursor:pointer">削除</span></div>`;
        });

        // 保存
        localStorage.setItem('dance_m', JSON.stringify(members));
        localStorage.setItem('dance_u', JSON.stringify(units));
    }

    // メンバー追加
    function addM() {
        const name = document.getElementById('mIn').value.trim();
        if(name) {
            members.push(name);
            document.getElementById('mIn').value = '';
            view();
        }
    }

    // ユニット追加
    function addU() {
        const name = document.getElementById('uIn').value.trim();
        const dur = (parseInt(document.getElementById('uM').value)||0)*60 + (parseInt(document.getElementById('uS').value)||0);
        const sel = Array.from(document.querySelectorAll('input[name="c"]:checked')).map(c => c.value);
        if(!name || dur <= 0 || sel.length === 0) return alert("入力が足りません");
        units.push({ n: name, d: dur, m: sel });
        document.getElementById('uIn').value = '';
        view();
    }

    function delM(i) { members.splice(i,1); view(); }
    function delU(i) { units.splice(i,1); view(); }
    function clearAllData() { localStorage.clear(); location.reload(); }

    // 生成
    function gen() {
        if(units.length === 0) return alert("ユニットがありません");

        ttData = [];
        let lastM = [];
