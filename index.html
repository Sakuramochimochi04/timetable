<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance TT Optimizer - Anti-Clustering</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; --gray: #5f6368; --opt: #673ab7; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; background: #f4f7f9; color: #333; }
        .box { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .m-item { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 0.85rem; align-items: center; }
        .u-form { background: #fafafa; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .member-chip { cursor: pointer; padding: 6px 14px; border-radius: 20px; border: 1px solid #eee; background: #fff; font-size: 0.8rem; transition: 0.2s; }
        .member-chip.selected { border-color: var(--primary); background: #e8f0fe; color: var(--primary); font-weight: bold; }
        .u-card { background: #fff; border: 1px solid #e0e0e0; border-left: 8px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .u-card.pos-first { border-left-color: #ffc107; background: #fffdf0; }
        .u-card.pos-last { border-left-color: #9c27b0; background: #fef0ff; }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 10px 20px; }
        .btn-opt { background: var(--opt); color: white; border: none; width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 10px; box-shadow: 0 4px 0 #4527a0; }
        .btn-pdf { background: #f44336; color: white; border: none; width: 100%; padding: 12px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        .row-r { background: #fff5f5; color: #e53e3e; font-weight: bold; }
        .no-print { display: block; }
        #back-btn { display: none; margin-bottom: 15px; background: #eee; border: 1px solid #ccc; padding: 8px; }
    </style>
</head>
<body id="b">

<div class="box">
    <h1>Dance TT Builder Pro</h1>

    <div class="no-print">
        <section>
            <h3>1. メンバー追加</h3>
            <div style="display:flex; gap:10px;"><input type="text" id="mIn" style="flex:1; padding:10px;" placeholder="名前"><button class="btn-blue" onclick="addM()">追加</button></div>
            <div id="mGrid" class="m-grid"></div>
        </section>

        <section>
            <h3>2. ユニット登録</h3>
            <div class="u-form">
                <input type="text" id="uIn" placeholder="ユニット名" style="width:100%; padding:10px; box-sizing:border-box;"><br>
                <div style="margin:10px 0;">時間: <input type="number" id="uMin" value="3" style="width:40px;"> 分 <input type="number" id="uSec" value="0" style="width:40px;"> 秒</div>
                <div id="chipContainer" class="chip-container"></div>
                <button class="btn-blue" style="width:100%;" onclick="addU()">リストに追加</button>
            </div>
            <div id="uList" style="margin-top:20px;"></div>
        </section>

        <section>
            <h3>3. 生成オプション</h3>
            開始: <input type="time" id="sT" value="13:00"> 転換: <input type="number" id="tT" value="60" style="width:40px;"> 秒 休憩: <input type="number" id="rT" value="5" style="width:40px;"> 分
            <button class="btn-opt" onclick="smartOptimize()">⚡ 休憩を分散させて自動編成！</button>
            <p style="font-size: 0.8rem; color: #666; margin-top: 5px;">※15ユニット以上ある場合、適度に休憩を散らすよう調整します</p>
        </section>
    </div>

    <div id="res" style="display:none;">
        <h2 style="text-align:center;">TIME TABLE</h2>
        <table id="ttTable">
            <thead><tr><th>時刻</th><th>内容</th><th>出演者</th><th>時間</th></tr></thead>
            <tbody id="tBody"></tbody>
        </table>
        <div class="no-print">
            <button class="btn-pdf" onclick="generatePDF()">📄 PDF形式でダウンロード</button>
        </div>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    function load(k){ try{ return JSON.parse(localStorage.getItem(k)) || []; }catch(e){ return []; } }
    let members = load('dm8'), units = load('du8'), tt = [];

    function refresh() {
        members.sort((a, b) => a.localeCompare(b, 'ja'));
        const mg = document.getElementById('mGrid'), cc = document.getElementById('chipContainer'), ul = document.getElementById('uList');
        mg.innerHTML = ''; cc.innerHTML = ''; ul.innerHTML = '';
        members.forEach((m, i) => {
            mg.innerHTML += `<div class="m-item"><span>${m}</span><span onclick="delM(${i})" style="color:red;cursor:pointer">×</span></div>`;
            cc.innerHTML += `<div class="member-chip" onclick="this.classList.toggle('selected')">${m}</div>`;
        });
        units.forEach((u, i) => {
            ul.innerHTML += `<div class="u-card pos-${u.pos}"><div><b>${u.n}</b><br><small>👤${u.m.join(', ')}</small><div style="margin-top:8px;"><button class="edit-tag-btn ${u.pos==='none'?'active':''}" onclick="updateUIPos(${i},'none')">順不同</button><button class="edit-tag-btn ${u.pos==='first'?'active':''}" onclick="updateUIPos(${i},'first')">最初</button><button class="edit-tag-btn ${u.pos==='last'?'active':''}" onclick="updateUIPos(${i},'last')">最後</button></div></div><span onclick="delU(${i})" style="color:red;cursor:pointer">削除</span></div>`;
        });
        localStorage.setItem('dm8', JSON.stringify(members)); localStorage.setItem('du8', JSON.stringify(units));
    }

    function addM(){ const i = document.getElementById('mIn'); if(i.value.trim()){ members.push(i.value.trim()); i.value=''; refresh(); } }
    function delM(i){ members.splice(i,1); refresh(); }
    function addU(){
        const n = document.getElementById('uIn').value.trim(), d = (parseInt(document.getElementById('uMin').value)||0)*60 + (parseInt(document.getElementById('uSec').value)||0), s = Array.from(document.querySelectorAll('.member-chip.selected')).map(el => el.innerText);
        if(!n || s.length===0) return alert("入力不足");
        units.push({ n, d, m: s, pos: 'none' }); document.getElementById('uIn').value=''; refresh();
    }
    function delU(i){ units.splice(i,1); refresh(); }
    function updateUIPos(idx, pos) { if(pos !== 'none') units.forEach((u, i) => { if(u.pos === pos) u.pos = 'none'; }); units[idx].pos = pos; refresh(); }

    // --- 改良版：分散型最適化ロジック ---
    function smartOptimize() {
        if(units.length === 0) return;
        
        let attempts = 0;
        let bestResult = null;
        let minPenalty = Infinity;

        // 何パターンか試して一番「休憩が分散している」ものを選ぶ
        while(attempts < 50) {
            let res = tryGenerate();
            let penalty = calculatePenalty(res);
            if(penalty < minPenalty) {
                minPenalty = penalty;
                bestResult = res;
            }
            attempts++;
        }
        
        buildFinalTT(bestResult);
    }

    function tryGenerate() {
        let first = units.find(u => u.pos === 'first');
        let last = units.find(u => u.pos === 'last');
        let others = units.filter(u => u.pos === 'none').sort(() => Math.random() - 0.5);

        let sorted = [];
        if(first) sorted.push(first);
        
        let pool = [...others];
        while(pool.length > 0) {
            let prev = sorted[sorted.length - 1];
            // 被りがない候補を抽出
            let candidates = pool.filter(u => !u.m.some(m => prev ? prev.m.includes(m) : false));
            
            if(candidates.length > 0) {
                // 前半に詰め込みすぎないよう、候補からランダムに選択
                let chosen = candidates[Math.floor(Math.random() * candidates.length)];
                sorted.push(chosen);
                pool = pool.filter(u => u !== chosen);
            } else {
                sorted.push(pool.shift());
            }
        }
        if(last && !sorted.includes(last)) sorted.push(last);
        return sorted;
    }

    // 「休憩の固まり」をチェックする評価関数
    function calculatePenalty(sequence) {
        let penalty = 0;
        for(let i=0; i < sequence.length - 1; i++) {
            let current = sequence[i];
            let next = sequence[i+1];
            // メンバーが被っている＝休憩が発生する
            if(current.m.some(m => next.m.includes(m))) {
                // 後半（インデックスが大きい方）での発生に重いペナルティ
                penalty += (i + 1); 
            }
        }
        return penalty;
    }

    function buildFinalTT(pool) {
        const trans = parseInt(document.getElementById('tT').value)||0, rest = (parseInt(document.getElementById('rT').value)||0)*60;
        tt = []; let lastM = [];
        pool.forEach((u, i) => {
            const conflict = u.m.some(m => lastM.includes(m));
            if(conflict && tt.length > 0) {
                if(tt[tt.length-1].type==='t') tt.pop();
                tt.push({ type: 'r', n: '【休憩】着替え待ち', d: rest, m: '-' });
            }
            tt.push({ type: 'u', n: u.n, d: u.d, m: u.m.join(', ') });
            if(i < pool.length - 1) tt.push({ type: 't', n: '(転換)', d: trans, m: '-' });
            lastM = u.m;
        });
        draw();
    }

    function draw() {
        let cur = new Date(`2026/01/01 ${document.getElementById('sT').value}`);
        const body = document.getElementById('tBody'); body.innerHTML = '';
        tt.forEach((d, i) => {
            const cls = d.type==='r'?'row-r':'';
            body.innerHTML += `<tr class="${cls}"><td>${cur.toTimeString().split(' ')[0]}</td><td>${d.n} ${d.type==='mc'?`<span onclick="tt.splice(${i},1);draw()" style="color:red;cursor:pointer">[×]</span>`:''}</td><td>${d.m}</td><td>${Math.floor(d.d/60)}分${d.d%60}秒</td></tr>`;
            if(i < tt.length - 1) body.innerHTML += `<tr class="no-print"><td colspan="4" style="padding:0"><button onclick="insMC(${i})" style="width:100%;font-size:10px;background:none;border:1px dashed var(--primary);color:var(--primary);cursor:pointer">+ MC挿入</button></td></tr>`;
            cur = new Date(cur.getTime() + d.d * 1000);
        });
        document.getElementById('res').style.display = 'block';
    }

    function insMC(i){ const m = prompt("MC分", "5"); if(m){ tt.splice(i+1,0,{type:'mc',n:'【MC】トーク',d:parseInt(m)*60,m:'-'}); draw(); } }
    function generatePDF() {
        const doc = new jsPDF(); doc.text("TIME TABLE", 14, 15); const rows = [];
        document.querySelectorAll("#tBody tr:not(.no-print)").forEach(tr => {
            const cells = tr.querySelectorAll("td");
            if(cells.length === 4) rows.push([cells[0].innerText, cells[1].innerText, cells[2].innerText, cells[3].innerText]);
        });
        doc.autoTable({ head: [['Time', 'Content', 'Performers', 'Duration']], body: rows, startY: 20, headStyles: { fillColor: [26, 115, 232] } });
        doc.save("timetable.pdf");
    }
    refresh();
</script>
</body>
</html>
