<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ダンスタイムテーブル作成</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; border: 1px solid #ddd; }
        section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        .btn-blue { background: #007bff; color: white; border: none; cursor: pointer; }
        .btn-green { background: #28a745; color: white; border: none; width: 100%; font-size: 1.2rem; cursor: pointer; }
        .btn-red { background: #dc3545; color: white; border: none; cursor: pointer; font-size: 0.8rem; float: right; }
        .list-item { display: flex; justify-content: space-between; background: #f1f1f1; padding: 8px; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .bg-rest { background: #fff3cd; }
        .bg-mc { background: #d1ecf1; }
        .ins-mc { display: block; margin: 5px auto; font-size: 0.8rem; color: #007bff; cursor: pointer; background: white; border: 1px dashed #007bff; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <button class="btn-red" onclick="localStorage.clear(); location.reload();">全データ初期化</button>
    <h1>TT作成ツール</h1>

    <section>
        <h3>1. メンバー登録</h3>
        <input type="text" id="mName" placeholder="名前を入力">
        <button class="btn-blue" onclick="addM()">追加</button>
        <div id="mShow"></div>
    </section>

    <section>
        <h3>2. ユニット登録</h3>
        <input type="text" id="uName" placeholder="ユニット名" style="width: 80%;"><br>
        時間: <input type="number" id="uMin" value="3" style="width: 50px;"> 分 
        <input type="number" id="uSec" value="0" style="width: 50px;"> 秒<br>
        出演者を選択:<br>
        <div id="mCheck" style="padding: 10px; background: #fafafa; border: 1px solid #eee; margin: 5px 0;"></div>
        <button class="btn-blue" onclick="addU()">ユニットを登録</button>
        <div id="uShow"></div>
    </section>

    <section>
        <h3>3. 全体設定</h3>
        開始: <input type="time" id="startTime" value="13:00"><br>
        転換: <input type="number" id="tTime" value="60" style="width: 50px;"> 秒
        回避休憩: <input type="number" id="rTime" value="5" style="width: 50px;"> 分<br>
        <button class="btn-green" onclick="makeTT()">タイムテーブル生成！</button>
    </section>

    <div id="res" style="display:none;">
        <hr>
        <h2>完成タイムテーブル</h2>
        <table>
            <thead>
                <tr><th>時刻</th><th>内容</th><th>メンバー</th><th>時間</th></tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 安全にデータを読み込む関数
    function loadData(key) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        } catch (e) {
            return [];
        }
    }

    let members = loadData('dance_m');
    let units = loadData('dance_u');
    let tt = [];

    // 画面を更新する
    function refresh() {
        // メンバー表示
        const mShow = document.getElementById('mShow');
        const mCheck = document.getElementById('mCheck');
        mShow.innerHTML = '';
        mCheck.innerHTML = '';
        members.forEach((m, i) => {
            mShow.innerHTML += `<div class="list-item">${m} <button onclick="delM(${i})" style="color:red; border:none; background:none; cursor:pointer;">×削除</button></div>`;
            mCheck.innerHTML += `<label style="margin-right:10px;"><input type="checkbox" name="selM" value="${m}"> ${m}</label>`;
        });

        // ユニット表示
        const uShow = document.getElementById('uShow');
        uShow.innerHTML = '';
        units.forEach((u, i) => {
            uShow.innerHTML += `<div class="list-item"><b>${u.n}</b> (${u.d}秒) <button onclick="delU(${i})" style="color:red; border:none; background:none; cursor:pointer;">×削除</button></div>`;
        });

        // 保存
        localStorage.setItem('dance_m', JSON.stringify(members));
        localStorage.setItem('dance_u', JSON.stringify(units));
    }

    // メンバー追加
    function addM() {
        const input = document.getElementById('mName');
        if (input.value.trim()) {
            members.push(input.value.trim());
            input.value = '';
            refresh();
        }
    }

    // ユニット追加
    function addU() {
        const name = document.getElementById('uName').value.trim();
        const min = parseInt(document.getElementById('uMin').value) || 0;
        const sec = parseInt(document.getElementById('uSec').value) || 0;
        const dur = (min * 60) + sec;
        const selected = Array.from(document.querySelectorAll('input[name="selM"]:checked')).map(el => el.value);

        if (!name || dur <= 0 || selected.length === 0) {
            alert("入力が正しくありません（名前・時間・メンバー必須）");
            return;
        }
        units.push({ n: name, d: dur, m: selected });
        document.getElementById('uName').value = '';
        refresh();
    }

    function delM(i) { members.splice(i, 1); refresh(); }
    function delU(i) { units.splice(i, 1); refresh(); }

    // TT生成
    function makeTT() {
        if (units.length === 0) { alert("ユニットを登録してください"); return; }
        
        const trans = parseInt(document.getElementById('tTime').value) || 0;
        const rest = (parseInt(document.getElementById('rTime').value) || 0) * 60;
        
        tt = [];
        let lastM = [];
        let remain = [...units];

        while (remain.length > 0) {
            let idx = remain.findIndex(u => !u.m.some(m => lastM.includes(m)));
            
            if (idx === -1) {
                // 休憩を入れる（直前が転換なら消す）
                if (tt.length > 0 && tt[tt.length-1].type === 't') tt.pop();
                tt.push({ type: 'r', n: '【休憩】', d: rest, m: '-' });
                lastM = [];
                continue;
            }

            const target = remain.splice(idx, 1)[0];
            tt.push({ type: 'u', n: target.n, d: target.d, m: target.m.join(', ') });
            if (remain.length > 0) tt.push({ type: 't', n: '(転換)', d: trans, m: '-' });
            lastM = target.m;
        }
        showTT();
    }

    function showTT() {
        let cur = new Date(`2026/01/01 ${document.getElementById('startTime').value}`);
        const body = document.getElementById('tBody');
        body.innerHTML = '';

        tt.forEach((item, i) => {
            const row = `<tr class="${item.type==='r'?'bg-rest':item.type==='mc'?'bg-mc':''}">
                <td>${cur.toTimeString().split(' ')[0]}</td>
                <td>${item.n}</td><td>${item.m}</td>
                <td>${Math.floor(item.d/60)}分${item.d%60}秒</td>
            </tr>`;
            body.innerHTML += row;
            
            // MCボタン
            if (i < tt.length - 1) {
                body.innerHTML += `<tr><td colspan="4" style="border:none; padding:0;"><button class="ins-mc" onclick="insMC(${i})">+ ここにMCを挿入</button></td></tr>`;
            }
            cur = new Date(cur.getTime() + item.d * 1000);
        });
        document.getElementById('res').style.display = 'block';
    }

    function insMC(i) {
        const m = prompt("MCの時間（分）", "5");
        if (m) {
            tt.splice(i + 1, 0, { type: 'mc', n: '【MC】', d: parseInt(m) * 60, m: '-' });
            showTT();
        }
    }

    // 最初に一度画面を更新
    refresh();
    alert("JavaScriptは動いています！");
</script>

</body>
</html>
